name: markview-reader
title: MarkView
base: core24
version: '1.0.5'
summary: AI-native Markdown reader with Mermaid, KaTeX, and Vega-Lite
description: |
  MarkView renders Markdown the way modern LLMs produce it — diagrams,
  equations, and data visualisations as first-class citizens.

  Supported out of the box:
    • Mermaid flowcharts / sequence / state / gantt / class / ERD / pie /
      mindmap / timeline / journey
    • KaTeX inline + block math, matrices, integrals
    • Vega-Lite bar / line / scatter / heatmap / candlestick / stacked area
    • GFM tables, task lists, footnotes, strikethrough
    • Syntax highlighting for 100+ languages (highlight.js)

  Binds itself as the default .md handler on first run.

grade: stable
confinement: strict
license: MIT
icon: src-tauri/icons/128x128.png
source-code: https://github.com/scos-lab/markview
issues: https://github.com/scos-lab/markview/issues
contact: https://github.com/scos-lab/markview/issues

# Use KDE neon extension for Qt/WebEngine? No — we use GNOME (GTK + WebKit2).
# `gnome` extension pulls GTK3, WebKit2GTK, and related deps; plays nicely
# with Tauri 2 which targets webkit2gtk-4.1.
apps:
  markview-reader:
    command: usr/bin/markview
    desktop: usr/share/applications/io.github.scos-lab.MarkView.desktop
    extensions: [gnome]
    plugs:
      - home
      - removable-media
      - network
      - browser-support
    common-id: io.github.scos-lab.MarkView
    environment:
      # WebKit2GTK tries to nest its own bubblewrap sandbox inside snap
      # confinement and fails. Disable WebKit's sandbox — snap already
      # provides isolation. Also force software rendering fallbacks where
      # DMABUF is rejected by the snap GPU interface.
      WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS: "1"
      WEBKIT_DISABLE_DMABUF_RENDERER: "1"
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"

parts:
  markview:
    plugin: nil
    source: .
    build-packages:
      - build-essential
      - curl
      - wget
      - libssl-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - libwebkit2gtk-4.1-dev
      - libsoup-3.0-dev
      - file
    stage-packages:
      # webkit2gtk-4.1 is NOT in the gnome extension (which ships webkit6);
      # Tauri 2 on Linux links against webkit2gtk-4.1, so we stage it.
      - libwebkit2gtk-4.1-0
      - libsoup-3.0-0
      - libayatana-appindicator3-1
      # Do NOT stage librsvg2-2, libgtk-3, libglib — the gnome extension
      # provides them; staging conflicts caused libpixbufloader_svg crash.
    override-build: |
      set -eux
      # Install Node.js 22 and Rust on the fly (no snapcraft plugin covers
      # both cleanly for Tauri 2)
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
        sh -s -- -y --default-toolchain stable --profile minimal
      export PATH="$HOME/.cargo/bin:$PATH"

      # Build frontend and Tauri binary
      npm ci
      npm run tauri build -- --bundles deb

      # Unpack the generated .deb so Snap can stage its contents
      DEB=$(ls src-tauri/target/release/bundle/deb/*.deb | sort -V | tail -1)
      dpkg-deb -x "$DEB" "$CRAFT_PART_INSTALL"

      # Rename desktop file + metainfo to the reverse-DNS Flathub-style ID
      # so the same ID works across Snap and Flathub
      OLD_ID="MarkView - Markdown Reader"
      NEW_ID="io.github.scos-lab.MarkView"
      if [ -f "$CRAFT_PART_INSTALL/usr/share/applications/${OLD_ID}.desktop" ]; then
        mv "$CRAFT_PART_INSTALL/usr/share/applications/${OLD_ID}.desktop" \
           "$CRAFT_PART_INSTALL/usr/share/applications/${NEW_ID}.desktop"
        # Adjust Exec= and Icon= if they point to the old name
        sed -i "s/^Icon=.*/Icon=${NEW_ID}/" \
           "$CRAFT_PART_INSTALL/usr/share/applications/${NEW_ID}.desktop"
      fi

      # Install AppStream metainfo
      install -Dm644 packaging/io.github.scos-lab.MarkView.metainfo.xml \
        "$CRAFT_PART_INSTALL/usr/share/metainfo/${NEW_ID}.metainfo.xml"

      # Copy icon under the expected Snap/Flatpak name
      install -Dm644 src-tauri/icons/128x128.png \
        "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps/${NEW_ID}.png"
